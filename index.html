<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Sofi ❤️</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        background: radial-gradient(circle, #000000, #000000);
        font-family: Arial, sans-serif;
        transition: background 1s;
    }

    .texto {
        position: absolute;
        top: 45%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: white;
        font-size: 2.5em;
        text-align: center;
        text-shadow: 0 0 10px red, 0 0 20px red, 0 0 40px red;
        transition: 0.5s;
        cursor: pointer;
    }

    .guia {
        position: absolute;
        bottom: 20px;
        width: 100%;
        text-align: center;
        color: #aaa;
        font-size: 1em;
        opacity: 0.8;
    }

    .corazon {
        position: absolute;
        color: red;
        animation: caer linear infinite;
    }

    @keyframes caer {
        0% { transform: translateY(-10vh); opacity: 1; }
        100% { transform: translateY(110vh); opacity: 0; }
    }

    .toque {
        position: absolute;
        color: pink;
        animation: desvanecer 1s forwards;
    }

    @keyframes desvanecer {
        0% { opacity: 1; transform: scale(1); }
        100% { opacity: 0; transform: scale(2); }
    }
</style>
</head>
<body>

<div id="texto" class="texto">Haz click aquí</div>
<div id="guia" class="guia">(Espera un momento… hay algo importante)</div>

<!-- Música YouTube -->
<iframe 
    id="musicaYT"
    width="0" 
    height="0"
    src=""
    frameborder="0"
    allow="autoplay">
</iframe>

<script>
let estado = -1;
let musicaIniciada = false;
const texto = document.getElementById("texto");
const guia = document.getElementById("guia");
const musicaYT = document.getElementById("musicaYT");

const mensajes = [
    "Vuelve a presionar aquí",
    "No sabes lo especial que eres...",
    "De verdad, haces todo diferente",
    "Y no quiero que eso cambie nunca",
    "A veces no encuentro las palabras...",
    "Pero sí lo que siento",
    "Y es algo muy fuerte"
];

function escribirTexto(textoNuevo, i = 0) {
    if (i < textoNuevo.length) {
        texto.innerHTML = textoNuevo.slice(0, i + 1);
        setTimeout(() => escribirTexto(textoNuevo, i + 1), 40);
    }
}

texto.addEventListener("click", (e) => {
    crearToque(e);

    // PRIMER CLICK: advertencia de anuncios
    if (estado === -1) {
        texto.innerHTML = "Espera unos segundos...";
        guia.innerHTML = "(Puede aparecer un anuncio, espera a que termine y vuelve a presionar)";

        musicaYT.src = "https://www.youtube.com/embed/q07Gd6Q-7dY?start=94&autoplay=1&loop=1&playlist=q07Gd6Q-7dY";
        musicaIniciada = true;

        estado = 0;
        return;
    }

    // SEGUNDO CLICK: empieza experiencia
    if (estado === 0) {
        guia.innerHTML = "(Ahora sí… sigue presionando)";
    }

    if (estado > 0 && estado <= mensajes.length) {
        escribirTexto(mensajes[estado - 1]);
        document.body.style.background = "radial-gradient(circle, #220000, #000000)";
    }

    if (estado === mensajes.length + 1) {
        guia.innerHTML = "...";
        texto.innerHTML = "";

        setTimeout(() => {
            texto.innerHTML = "Te quiero mucho Sofi ❤️";
            texto.style.fontSize = "3em";
            document.body.style.background = "radial-gradient(circle, red, black)";
            lluviaFinal();
        }, 1000);
    }

    if (estado > mensajes.length + 1) {
        guia.innerHTML = "Gracias por llegar hasta aquí ❤️";
    }

    estado++;
});

function crearCorazon() {
    const c = document.createElement("div");
    c.classList.add("corazon");
    c.innerHTML = "❤";
    c.style.left = Math.random() * 100 + "vw";
    c.style.animationDuration = (Math.random() * 3 + 2) + "s";
    c.style.fontSize = (Math.random() * 20 + 10) + "px";
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 5000);
}

function lluviaFinal() {
    setInterval(() => {
        for (let i = 0; i < 6; i++) crearCorazon();
    }, 200);
}

function crearToque(e) {
    const t = document.createElement("div");
    t.classList.add("toque");
    t.innerHTML = "❤";
    t.style.left = e.clientX + "px";
    t.style.top = e.clientY + "px";
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 1000);
}

setInterval(crearCorazon, 300);
</script>

</body>
</html>
